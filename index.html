<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtR 10th Anniversary グッズ計算表</title>
    <style>
        :root {
            --soraru-blue: #00a0e9;
            --mafu-pink: #ffb6c1;
            --spring-pink: #e91e63;
            --anniversary-gold: #d4af37;
            --atr-dark: #2c3e50;
            --bg-light: #fdfdfe;
            --set-gray: #f2f2f2; /* セット用の薄いグレー */
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 10px;
            padding-bottom: 160px;
        }

        .notice-bar {
            background-color: #fff9db;
            border: 1px solid #fab005;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 0.7rem;
            line-height: 1.4;
            color: #856404;
        }
        .notice-bar a { color: #d9480f; font-weight: bold; }

        .header {
            text-align: center;
            border: 2px solid var(--anniversary-gold);
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .tour-title { font-size: 0.75rem; font-weight: bold; color: var(--atr-dark); }
        h1 { margin: 5px 0 0; font-size: 1.1rem; }

        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            background: var(--bg-light);
            padding: 10px 0;
            z-index: 10;
        }

        .tab {
            padding: 8px 12px;
            font-size: 0.75rem;
            border-radius: 20px;
            background: #eee;
            cursor: pointer;
            border: none;
            white-space: nowrap;
        }

        .tab.active { background: var(--atr-dark); color: white; }

        .item-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .item-card {
            background: white;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top: 4px solid var(--anniversary-gold);
        }

        /* セットアイテム専用の背景色 */
        .set-item {
            background-color: var(--set-gray);
        }

        .soraru-item { border-top-color: var(--soraru-blue); }
        .mafu-item { border-top-color: var(--mafu-pink); }
        .spring-item { border-top-color: var(--spring-pink); }

        .item-name { font-size: 0.75rem; font-weight: bold; min-height: 2.5em; margin-bottom: 5px; }
        .item-price { font-size: 0.8rem; color: #666; margin-bottom: 8px; }

        .counter {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.6); /* 背景がグレーの時も馴染むように */
            border-radius: 15px;
            padding: 2px 5px;
        }

        .btn { border: none; background: none; font-size: 1.2rem; padding: 5px 10px; cursor: pointer; }
        .count-display { font-weight: bold; font-size: 0.9rem; }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
            padding: 15px;
            border-radius: 15px 15px 0 0;
        }

        .total-box { display: flex; justify-content: space-between; align-items: center; max-width: 500px; margin: 0 auto; }
        .total-amount { font-size: 1.5rem; color: #e74c3c; font-weight: bold; }
        .selected-summary { font-size: 0.7rem; color: #999; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="notice-bar">
    ※本ツールはいちファン（オタク）が作成した非公式の計算用ツールです。公式サイト・運営様とは一切関係ありません。<br>
    公式サイト：<a href="https://aftertherain.co.jp/Live_2026/goods" target="_blank">After the Rain 10th Goods Information</a>
</div>

<div class="header">
    <div class="tour-title">After the Rain 10th Anniversary Tour 2026 春</div>
    <h1>Goods Calculator</h1>
</div>

<div class="tabs">
    <button class="tab active" onclick="filterItems('all', event)">すべて</button>
    <button class="tab" onclick="filterItems('soraru', event)">そらる</button>
    <button class="tab" onclick="filterItems('mafu', event)">まふまふ</button>
    <button class="tab" onclick="filterItems('spring', event)">春限定</button>
</div>

<div class="item-grid" id="item-grid"></div>

<div class="footer">
    <div class="total-box">
        <span style="font-weight:bold;">合計</span>
        <span class="total-amount" id="total-amount">¥0</span>
    </div>
    <div class="selected-summary" id="selected-summary">アイテムを選択してください</div>
</div>

<script>
    const goods = [
        // セット販売（isSet: true を追加）
        { n: "-10th Spring-セット", p: 7900, t: "spring", isSet: true },
        { n: "そらるセット", p: 13700, t: "soraru", isSet: true },
        { n: "まふまふセット", p: 13700, t: "mafu", isSet: true },
        // 単品
        { n: "10th アニバーサリーカスタムペンライト", p: 5500, t: "common" },
        { n: "春色カスタムパーツセット【そらる】", p: 1300, t: "soraru" },
        { n: "春色カスタムパーツセット【まふまふ】", p: 1300, t: "mafu" },
        { n: "春夏秋冬ぬいぐるみ【そらる】", p: 3500, t: "soraru" },
        { n: "春夏秋冬ぬいぐるみ【まふまふ】", p: 3500, t: "mafu" },
        { n: "べびーぬいキーホルダー【そらる】", p: 2500, t: "soraru" },
        { n: "べびーぬいキーホルダー【まふまふ】", p: 2500, t: "mafu" },
        { n: "ひよこぬいリング【そらる】", p: 1800, t: "soraru" },
        { n: "ひよこぬいリング【まふまふ】", p: 1800, t: "mafu" },
        { n: "アクリルスタンド【そらる】", p: 1800, t: "soraru" },
        { n: "アクリルスタンド【まふまふ】", p: 1800, t: "mafu" },
        { n: "SDアクリルキーホルダー【そらる】", p: 800, t: "soraru" },
        { n: "SDアクリルキーホルダー【まふまふ】", p: 800, t: "mafu" },
        { n: "マフラータオル【そらる】", p: 2000, t: "soraru" },
        { n: "マフラータオル【まふまふ】", p: 2000, t: "mafu" },
        { n: "刺繍タグセット-10th Spring-", p: 1500, t: "spring" },
        { n: "AtRチャームシューズセット", p: 3500, t: "common" },
        { n: "折りたたみエコバッグ", p: 1600, t: "common" },
        { n: "Tシャツ-10th Spring-", p: 3800, t: "spring" },
        { n: "ラバーバンド-10th Spring-", p: 800, t: "spring" },
        { n: "クリアファイル-10th Spring-", p: 400, t: "spring" },
        { n: "ライブ衣装チェキ風カードくじ", p: 400, t: "common" },
        { n: "缶バッジくじ-10th Spring-", p: 400, t: "spring" }
    ];

    let counts = new Array(goods.length).fill(0);
    let currentFilter = 'all';

    function render() {
        const grid = document.getElementById('item-grid');
        grid.innerHTML = '';
        goods.forEach((g, i) => {
            if (currentFilter === 'all' || g.t === currentFilter) {
                const card = document.createElement('div');
                // セットアイテムなら set-item クラスを付与
                card.className = `item-card ${g.t}-item ${g.isSet ? 'set-item' : ''}`;
                card.innerHTML = `
                    <div class="item-name">${g.n}</div>
                    <div class="item-price">¥${g.p.toLocaleString()}</div>
                    <div class="counter">
                        <button class="btn" onclick="upd(${i},-1)">−</button>
                        <span class="count-display" id="c${i}">${counts[i]}</span>
                        <button class="btn" onclick="upd(${i},1)">＋</button>
                    </div>
                `;
                grid.appendChild(card);
            }
        });
    }

    function filterItems(type, event) {
        currentFilter = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if (event) event.target.classList.add('active');
        render();
    }

    function upd(i, d) {
        counts[i] = Math.max(0, counts[i] + d);
        document.getElementById(`c${i}`).innerText = counts[i];
        let total = 0;
        let sel = [];
        goods.forEach((g, idx) => {
            if(counts[idx] > 0) {
                total += g.p * counts[idx];
                sel.push(`${g.n}×${counts[idx]}`);
            }
        });
        document.getElementById('total-amount').innerText = `¥${total.toLocaleString()}`;
        document.getElementById('selected-summary').innerText = sel.length > 0 ? sel.join(', ') : "アイテムを選択してください";
    }

    render();
</script>
</body>
</html>
